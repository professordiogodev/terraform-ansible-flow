# We need to define the private keys to even ping the instances

[web_servers]
web1 ansible_host="{{ web1_ip }}" ansible_user=ec2-user ansible_ssh_private_key_file=./keys/diogo-ssh-key.pem
web2 ansible_host="{{ web2_ip }}" ansible_user=ec2-user ansible_ssh_private_key_file=./keys/diogo-ssh-key.pem

[db_servers]
db1 ansible_host="{{ db1_ip }}" ansible_user=ec2-user ansible_ssh_private_key_file=./keys/diogo-ssh-key.pem
