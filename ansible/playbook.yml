---
- name: Simple single-instance web server setup
  hosts: web
  become: true

  tasks:
    - name: Stop and disable Apache (installed by EC2 user_data, conflicts with Nginx on port 80)
      ansible.builtin.systemd:
        name: httpd
        state: stopped
        enabled: false
      failed_when: false

    - name: Install Nginx using DNF
      ansible.builtin.dnf:
        name: nginx
        state: present

    - name: Ensure Nginx is started and enabled
      ansible.builtin.systemd:
        name: nginx
        state: started
        enabled: true

    - name: Deploy a static index page
      ansible.builtin.copy:
        dest: /usr/share/nginx/html/index.html
        owner: root
        group: root
        mode: "0644"
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <title>Single Instance</title>
          </head>
          <body>
              <h1>Hello from the single-instance branch!</h1>
          </body>
          </html>

    - name: Print the index.html content for verification
      ansible.builtin.command: cat /usr/share/nginx/html/index.html
      register: nginx_content
      changed_when: false

    - name: Show index.html content in Ansible output
      ansible.builtin.debug:
        var: nginx_content.stdout_lines
